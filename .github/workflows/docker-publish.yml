name: Publish Docker image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  IMAGE_NAME: web

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=ref,event=branch
            type=ref,event=tag

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  update-gitops:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
    steps:
      - name: Generate labby token
        id: labby
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.LABBY_APP_ID }}
          private-key: ${{ secrets.LABBY_PRIVATE_KEY }}
          owner: CSKU-Lab
          repositories: gitops

      - name: Checkout gitops repo
        uses: actions/checkout@v4
        with:
          repository: CSKU-Lab/gitops
          token: ${{ steps.labby.outputs.token }}

      - name: Update web image tag
        run: |
          sed -i "s/imageTag: '.*'/imageTag: '${{ github.ref_name }}'/" apps/web/env.libsonnet

      - name: Commit and push
        run: |
          git config user.name "labby[bot]"
          git config user.email "labby[bot]@users.noreply.github.com"
          git add apps/web/env.libsonnet
          git commit -m "chore(web): update image tag to ${{ github.ref_name }}"
          git push
